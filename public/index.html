<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Pro - WEB 2</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="welcome-container" id="welcome-screen">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Pokebola"
            class="welcome-icon">
        <h1>¡Bienvenidos a la Pokédex!</h1>
        <p>Hace click en el botón para ver todos los Pokémon</p>
        <button id="load-btn" class="main-btn">VER TODOS LOS POKÉMON</button>
    </div>
    <div id="main-content" class=" main-wrapper hidden">
        <header class="pokedex-header">
            <h2>Busca tu Pokémon favorito</h2>
            <div class="search-container">
                <input type="text" id="poke-search" placeholder="Buscar Pokémon......">
            </div>
        </header>
        <main id="pokedex-container">

        </main>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
